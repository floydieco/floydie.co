<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Floydie — Content Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #ed4018;
    --dark: #191919;
    --white: #ffffff;
    --surface: #1e1e1e;
    --surface2: #252525;
    --surface3: #2d2d2d;
    --border: rgba(255,255,255,0.07);
    --text: #f0f0f0;
    --muted: #888;
    --dimmed: #555;
    --faith: #534AB7;
    --family: #1D9E75;
    --brand: #378ADD;
    --value: #ed4018;
    --personal: #888780;
    --fitness: #E8A020;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    min-height: 100vh;
  }
  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo-wordmark {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: .04em;
    color: var(--white);
  }
  .logo-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--red);
  }
  .topbar-right {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .last-updated {
    font-size: 12px;
    color: var(--muted);
  }
  .tag {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 4px;
    letter-spacing: .04em;
    text-transform: uppercase;
  }
  .tag-live { background: rgba(29,158,117,.18); color: #1D9E75; }
  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 2rem;
  }
  .filter-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 1.75rem;
    flex-wrap: wrap;
  }
  .filter-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--dimmed);
    margin-right: 4px;
  }
  .month-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    padding: 5px 13px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all .15s;
  }
  .month-btn:hover { border-color: rgba(255,255,255,.2); color: var(--text); }
  .month-btn.active { background: var(--white); color: var(--dark); border-color: var(--white); font-weight: 600; }
  .metrics {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 1.5rem;
  }
  .metric {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
  }
  .metric-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .07em;
    color: var(--dimmed);
    margin-bottom: 8px;
  }
  .metric-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px;
    line-height: 1;
    color: var(--white);
    letter-spacing: .02em;
  }
  .metric-val.green { color: #1D9E75; }
  .metric-val.blue { color: #378ADD; }
  .metric-val.red { color: var(--red); }
  .metric-sub {
    font-size: 11px;
    color: var(--dimmed);
    margin-top: 4px;
  }
  .grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 1.5rem;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
  }
  .card-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--dimmed);
    margin-bottom: 16px;
  }
  .angle-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .angle-row:last-child { margin-bottom: 0; }
  .angle-name {
    font-size: 12px;
    color: var(--text);
    min-width: 118px;
  }
  .angle-bar-wrap {
    flex: 1;
    height: 6px;
    background: var(--surface3);
    border-radius: 3px;
    overflow: hidden;
  }
  .angle-bar {
    height: 100%;
    border-radius: 3px;
    transition: width .5s cubic-bezier(.4,0,.2,1);
  }
  .angle-count {
    font-size: 12px;
    color: var(--muted);
    min-width: 20px;
    text-align: right;
    font-weight: 600;
  }
  .trigger-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .trigger-row:last-child { border-bottom: none; }
  .trigger-pill {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: .08em;
    padding: 4px 12px;
    border-radius: 4px;
  }
  .pill-leads { background: rgba(237,64,24,.15); color: var(--red); }
  .pill-growth { background: rgba(232,160,32,.15); color: #E8A020; }
  .pill-system { background: rgba(55,138,221,.15); color: #378ADD; }
  .trigger-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    color: var(--white);
    letter-spacing: .02em;
  }
  .trigger-sub { font-size: 11px; color: var(--dimmed); }
  .pipeline {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
    margin-bottom: 1.5rem;
    overflow-x: auto;
  }
  .pipe-flow {
    display: flex;
    gap: 6px;
    min-width: 500px;
  }
  .pipe-stage {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
  }
  .pipe-stage + .pipe-stage::before {
    content: '›';
    position: absolute;
    left: -8px;
    top: 16px;
    color: var(--dimmed);
    font-size: 16px;
  }
  .pipe-box {
    width: 100%;
    padding: 12px 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
  }
  .pipe-posted .pipe-box { background: rgba(29,158,117,.1); border-color: rgba(29,158,117,.25); }
  .pipe-posted .pipe-num { color: #1D9E75; }
  .pipe-scheduled .pipe-box { background: rgba(55,138,221,.1); border-color: rgba(55,138,221,.25); }
  .pipe-scheduled .pipe-num { color: #378ADD; }
  .pipe-ready .pipe-box { background: rgba(83,74,183,.1); border-color: rgba(83,74,183,.25); }
  .pipe-ready .pipe-num { color: #7B74E0; }
  .pipe-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    color: var(--white);
    line-height: 1;
  }
  .pipe-label {
    font-size: 10px;
    color: var(--muted);
    text-align: center;
    margin-top: 4px;
    line-height: 1.3;
    font-weight: 500;
  }
  .table-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
    margin-bottom: 1.5rem;
    overflow-x: auto;
  }
  table { width: 100%; border-collapse: collapse; min-width: 560px; }
  th {
    text-align: left;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--dimmed);
    padding: 0 12px 10px 0;
    border-bottom: 1px solid var(--border);
  }
  td {
    padding: 11px 12px 11px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    color: var(--text);
    vertical-align: middle;
  }
  tr:last-child td { border-bottom: none; }
  .post-title { max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 500; }
  .badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 4px;
    letter-spacing: .03em;
    white-space: nowrap;
  }
  .b-faith { background: rgba(83,74,183,.2); color: #9B93E8; }
  .b-family { background: rgba(29,158,117,.2); color: #3DC99A; }
  .b-brand { background: rgba(55,138,221,.2); color: #70B3F0; }
  .b-value { background: rgba(237,64,24,.2); color: #F47A55; }
  .b-personal { background: rgba(136,135,128,.2); color: #AAAAAA; }
  .b-fitness { background: rgba(232,160,32,.2); color: #F0B840; }
  .b-posted { background: rgba(29,158,117,.15); color: #3DC99A; }
  .b-scheduled { background: rgba(55,138,221,.15); color: #70B3F0; }
  .b-ready { background: rgba(83,74,183,.15); color: #9B93E8; }
  .b-filming { background: rgba(232,160,32,.15); color: #F0B840; }
  .b-editing { background: rgba(237,64,24,.15); color: #F47A55; }
  .b-notstarted { background: rgba(255,255,255,.06); color: var(--muted); }
  .b-leads { background: rgba(237,64,24,.15); color: #F47A55; }
  .b-growth { background: rgba(232,160,32,.15); color: #F0B840; }
  .b-system { background: rgba(55,138,221,.15); color: #70B3F0; }
  .b-none { color: var(--dimmed); font-size: 12px; }
  .format-mix {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
  }
  .format-item {
    display: flex;
    align-items: baseline;
    gap: 6px;
  }
  .format-name { font-size: 12px; color: var(--muted); }
  .format-count {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    color: var(--white);
    line-height: 1;
  }
  .divider { width: 1px; height: 28px; background: var(--border); }
  .grid-3 {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
    margin-bottom: 1.5rem;
  }
  .empty-row { text-align: center; color: var(--dimmed); padding: 24px 0 !important; font-size: 12px; border: none !important; }
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 60vh;
    flex-direction: column;
    gap: 12px;
  }
  .spinner {
    width: 28px;
    height: 28px;
    border: 2px solid var(--border);
    border-top-color: var(--red);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 13px; color: var(--muted); }
  .error-msg { text-align: center; padding: 3rem; color: var(--muted); font-size: 13px; line-height: 1.8; }
  .error-msg a { color: var(--red); }
  @media (max-width: 768px) {
    .container { padding: 1rem; }
    .metrics { grid-template-columns: repeat(2, 1fr); }
    .grid-2 { grid-template-columns: 1fr; }
    .grid-3 { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">
    <div class="logo-dot"></div>
    <span class="logo-wordmark">Floydie</span>
  </div>
  <div class="topbar-right">
    <span class="last-updated" id="lastUpdated">—</span>
    <span class="tag tag-live">Live</span>
  </div>
</div>

<div class="container">
  <div id="app">
    <div class="loading">
      <div class="spinner"></div>
      <div class="loading-text">Loading content data...</div>
    </div>
  </div>
</div>

<script>
const ANGLE_COLORS = {
  'Faith': '#534AB7',
  'Family': '#1D9E75',
  'Behind the Brand': '#378ADD',
  'Value + CTA': '#ed4018',
  'Personal / Raw': '#888780',
  'Fitness': '#E8A020'
};
const ALL_ANGLES = ['Faith','Family','Behind the Brand','Value + CTA','Personal / Raw','Fitness'];
const PIPELINE_STAGES = ['Not Started','Filming','Editing','Ready to Post','Scheduled','Posted'];

let allPosts = [];
let activeMonth = 'all';

function fmtDate(iso) {
  if (!iso) return '';
  const [,m,d] = iso.split('-');
  const names = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${names[+m-1]} ${+d}`;
}

function monthKey(iso) { return iso ? iso.slice(0,7) : ''; }
function monthLabel(k) {
  const [y,m] = k.split('-');
  const names = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${names[+m-1]} ${y}`;
}

function angleClass(a) {
  return {Faith:'b-faith',Family:'b-family','Behind the Brand':'b-brand','Value + CTA':'b-value','Personal / Raw':'b-personal',Fitness:'b-fitness'}[a]||'';
}
function statusClass(s) {
  return {Posted:'b-posted',Scheduled:'b-scheduled','Ready to Post':'b-ready',Filming:'b-filming',Editing:'b-editing','Not Started':'b-notstarted'}[s]||'b-notstarted';
}
function triggerClass(t) {
  return {LEADS:'b-leads',GROWTH:'b-growth',SYSTEM:'b-system'}[t]||'';
}

function filtered() {
  if (activeMonth === 'all') return allPosts;
  return allPosts.filter(p => monthKey(p['date:Date:start']) === activeMonth);
}

function render() {
  const posts = filtered();
  const today = new Date().toISOString().slice(0,10);

  const total = posts.length;
  const posted = posts.filter(p => p.Status === 'Posted').length;
  const readySched = posts.filter(p => p.Status === 'Scheduled' || p.Status === 'Ready to Post').length;
  const withTrigger = posts.filter(p => p['Keyword Trigger'] && p['Keyword Trigger'] !== 'None').length;

  // angle counts
  const aC = {}; ALL_ANGLES.forEach(a => aC[a] = 0);
  posts.forEach(p => { if (aC[p.Angle] !== undefined) aC[p.Angle]++; });
  const maxA = Math.max(...Object.values(aC), 1);

  // trigger counts
  const tC = {LEADS:0,GROWTH:0,SYSTEM:0};
  posts.forEach(p => { if (tC[p['Keyword Trigger']] !== undefined) tC[p['Keyword Trigger']]++; });

  // pipeline
  const sC = {}; PIPELINE_STAGES.forEach(s => sC[s] = 0);
  posts.forEach(p => { if (sC[p.Status] !== undefined) sC[p.Status]++; });

  // format mix
  const fC = {Reel:0,Carousel:0,'Single Image':0};
  posts.forEach(p => { if (fC[p.Format] !== undefined) fC[p.Format]++; });

  // upcoming
  const upcoming = posts
    .filter(p => p['date:Date:start'] >= today)
    .sort((a,b) => a['date:Date:start'].localeCompare(b['date:Date:start']))
    .slice(0,5);

  // months for filter
  const months = [...new Set(allPosts.map(p => monthKey(p['date:Date:start'])).filter(Boolean))].sort();
  const monthBtns = months.map(m =>
    `<button class="month-btn${activeMonth===m?' active':''}" onclick="setMonth('${m}')">${monthLabel(m)}</button>`
  ).join('');

  const stagePipeClass = {'Posted':'pipe-posted','Scheduled':'pipe-scheduled','Ready to Post':'pipe-ready'};

  const upcomingRows = upcoming.length ? upcoming.map(p => `
    <tr>
      <td><div class="post-title" title="${esc(p['Post Title'])}">${esc(p['Post Title']||'Untitled')}</div></td>
      <td style="white-space:nowrap;color:#888;">${fmtDate(p['date:Date:start'])}</td>
      <td><span class="badge ${angleClass(p.Angle)}">${p.Angle||''}</span></td>
      <td style="color:#888;font-size:12px;">${p.Format||''}</td>
      <td><span class="badge ${statusClass(p.Status)}">${p.Status||''}</span></td>
      <td>${p['Keyword Trigger']&&p['Keyword Trigger']!=='None'?`<span class="badge ${triggerClass(p['Keyword Trigger'])}">${p['Keyword Trigger']}</span>`:'<span class="b-none">None</span>'}</td>
    </tr>
  `).join('') : `<tr><td colspan="6" class="empty-row">No upcoming posts in this window</td></tr>`;

  document.getElementById('app').innerHTML = `
    <div class="filter-bar">
      <span class="filter-label">Filter</span>
      <button class="month-btn${activeMonth==='all'?' active':''}" onclick="setMonth('all')">All time</button>
      ${monthBtns}
    </div>

    <div class="metrics">
      <div class="metric">
        <div class="metric-label">Total posts</div>
        <div class="metric-val">${total}</div>
        <div class="metric-sub">in pipeline</div>
      </div>
      <div class="metric">
        <div class="metric-label">Posted</div>
        <div class="metric-val green">${posted}</div>
        <div class="metric-sub">live on IG</div>
      </div>
      <div class="metric">
        <div class="metric-label">Scheduled / Ready</div>
        <div class="metric-val blue">${readySched}</div>
        <div class="metric-sub">queued up</div>
      </div>
      <div class="metric">
        <div class="metric-label">With trigger</div>
        <div class="metric-val red">${withTrigger}</div>
        <div class="metric-sub">ManyChat active</div>
      </div>
    </div>

    <div class="grid-2">
      <div class="card">
        <div class="card-title">Angle breakdown</div>
        ${ALL_ANGLES.map(name => `
          <div class="angle-row">
            <div class="angle-name">${name}</div>
            <div class="angle-bar-wrap"><div class="angle-bar" style="width:${Math.round(aC[name]/maxA*100)}%;background:${ANGLE_COLORS[name]};"></div></div>
            <div class="angle-count">${aC[name]}</div>
          </div>
        `).join('')}
      </div>
      <div class="card">
        <div class="card-title">ManyChat triggers</div>
        ${Object.entries(tC).map(([t,c]) => `
          <div class="trigger-row">
            <div>
              <div class="trigger-pill pill-${t.toLowerCase()}">${t}</div>
            </div>
            <div style="text-align:right;">
              <div class="trigger-num">${c}</div>
              <div class="trigger-sub">post${c!==1?'s':''}</div>
            </div>
          </div>
        `).join('')}
        <div style="margin-top:16px;padding-top:14px;border-top:1px solid var(--border);">
          <div class="card-title" style="margin-bottom:12px;">Format mix</div>
          <div class="format-mix">
            <div class="format-item"><span class="format-count">${fC.Reel}</span><span class="format-name">Reels</span></div>
            <div class="divider"></div>
            <div class="format-item"><span class="format-count">${fC.Carousel}</span><span class="format-name">Carousels</span></div>
            <div class="divider"></div>
            <div class="format-item"><span class="format-count">${fC['Single Image']}</span><span class="format-name">Singles</span></div>
          </div>
        </div>
      </div>
    </div>

    <div class="pipeline">
      <div class="card-title" style="margin-bottom:14px;">Content pipeline</div>
      <div class="pipe-flow">
        ${PIPELINE_STAGES.map(s => `
          <div class="pipe-stage ${stagePipeClass[s]||''}">
            <div class="pipe-box">
              <div class="pipe-num">${sC[s]}</div>
              <div class="pipe-label">${s}</div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>

    <div class="table-card">
      <div class="card-title" style="margin-bottom:14px;">Upcoming posts</div>
      <table>
        <thead>
          <tr>
            <th>Post title</th><th>Date</th><th>Angle</th><th>Format</th><th>Status</th><th>Trigger</th>
          </tr>
        </thead>
        <tbody>${upcomingRows}</tbody>
      </table>
    </div>
  `;
}

function esc(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function setMonth(m) {
  activeMonth = m;
  render();
}

async function init() {
  try {
    const res = await fetch('./data.json?t=' + Date.now());
    if (!res.ok) throw new Error('data.json not found');
    const json = await res.json();
    allPosts = json.posts || [];
    const ts = json.generated_at ? new Date(json.generated_at).toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}) : '';
    document.getElementById('lastUpdated').textContent = ts ? `Updated ${ts}` : '';
    render();
  } catch(e) {
    document.getElementById('app').innerHTML = `
      <div class="error-msg">
        <strong style="color:#f0f0f0;display:block;margin-bottom:8px;">No data found</strong>
        Make sure <code>data.json</code> exists in the same folder as this HTML file.<br>
        Run the GitHub Actions workflow or generate it locally with the Python script.<br><br>
        <a href="https://github.com" target="_blank">See setup guide in README.md</a>
      </div>
    `;
  }
}

init();
</script>
</body>
</html>
